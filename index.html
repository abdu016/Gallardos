<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comparación Visual</title>

  <link rel="stylesheet" href="https://unpkg.com/image-compare-viewer/dist/image-compare-viewer.min.css">
  <script src="https://unpkg.com/image-compare-viewer/dist/image-compare-viewer.min.js"></script>

  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      max-width: 900px;
      width: 100%;
      background-color: var(--card-bg);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    h1 {
      font-size: 1.6rem;
      margin-top: 0;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .description {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Contenedor del comparador */
    .viewer-wrapper {
      position: relative;
      width: 100%;
      max-width: 900px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
    }

    /* Etiquetas flotantes sobre la imagen */
    .badge {
      position: absolute;
      top: 16px;
      padding: 6px 14px;
      background: rgba(15, 23, 42, 0.75);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      border-radius: 20px;
      backdrop-filter: blur(4px);
      z-index: 10;
      pointer-events: none;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-lq { left: 16px; border-left: 3px solid #ef4444; }
    .badge-hq { right: 16px; border-right: 3px solid #10b981; }
  </style>
</head>
<body>

  <div class="container">
    <h1>El incendio de los Gallardos / Antes (08/07/2026) y Después (10/07/2026)</h1>
    <div class="description">
      Desliza el marcador central para comparar directamente el antes y el después de la imagen.
    </div>
  </div>

  <div class="viewer-wrapper">
    <div class="badge badge-lq">08/07/2026 </div>
    <div class="badge badge-hq">10/07/2026</div>
    
    <div class="image-compare" id="image-viewer">
      <img id="img-lq" alt="08/07/2026" />
      <img id="img-hq" alt="10/07/2026" />
    </div>
  </div>

  <script>
    // ==========================================
    // CONFIGURA AQUÍ LOS NOMBRES DE TUS IMÁGENES
    // ==========================================
    const URL_IMAGEN_LQ = './imagenes/GALLARDOS_08_07_2026.jpg'; 
    const URL_IMAGEN_HQ = './imagenes/GALLARDOS_10_07_2026.jpg';

    window.addEventListener("DOMContentLoaded", () => {
      const imgLQ = document.getElementById("img-lq");
      const imgHQ = document.getElementById("img-hq");

      // Asignar las rutas a las imágenes
      imgLQ.src = URL_IMAGEN_LQ;
      imgHQ.src = URL_IMAGEN_HQ;

      // Inicializar el comparador visual
      const viewer = new ImageCompare(document.getElementById("image-viewer"), {
        hoverStart: false,
        startPosition: 50 // Empieza justo en la mitad
      });
      viewer.mount();
    });
  </script>
</body>
</html>
